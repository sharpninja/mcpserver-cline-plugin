name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write    # Required for GitHub OIDC → MCP Registry
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: |
          if [ -d tests ] && ls tests/*.test.ts > /dev/null 2>&1; then
            npm test
          else
            echo "No tests found, skipping"
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to MCP Registry
        run: |
          if npm list -g @modelcontextprotocol/registry-cli > /dev/null 2>&1; then
            mcp registry publish io.github.${{ github.repository_owner }}/${{ github.event.repository.name }}
          else
            npm install -g @modelcontextprotocol/registry-cli 2>/dev/null || true
            mcp registry publish io.github.${{ github.repository_owner }}/${{ github.event.repository.name }} || \
              echo "Warning: MCP Registry publish failed (registry-cli may not be available yet)"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: McpServer Cline Plugin ${{ github.ref_name }}
          body: |
            ## McpServer Cline Plugin ${{ github.ref_name }}

            MCP server for Cline (VSCode) providing McpServer workflow tools.

            ### Features
            - 56 MCP tools across 4 namespaces: TODO, Session Log, Requirements, GraphRAG
            - Bridges Cline to `mcpserver-repl --agent-stdio` via YAML-over-STDIO
            - Auto-discovers workspace via `AGENTS-README-FIRST.yaml` marker file
            - Offline cache for resilient operation when McpServer is unreachable

            ### Installation

            ```bash
            npx @sharpninja/mcpserver-cline-plugin install
            ```

            Or download `install.sh` from this release and run:
            ```bash
            bash install.sh
            ```

            ### Prerequisites
            - VS Code with Cline extension (`saoudrizwan.claude-dev`)
            - McpServer running with `AGENTS-README-FIRST.yaml` marker file
            - Node.js 18+
          files: |
            dist/index.js
            install.sh
            server.json
